name: CI

# Quality gate for Marusja Cakes — runs on every PR and on pushes to main.
# Mirrors the repo's green-light bar (see CLAUDE.md): `check` clean, unit suite
# green, E2E green. Deploy (deploy.yml) runs separately on push to main.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-unit:
    name: Types, a11y check & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # svelte-check: TypeScript + a11y. Must be clean.
      - run: npm run check

      # Vitest unit suite (logic layer + UI primitives).
      - run: npm test

      # Prove the static build succeeds (adapter-static, strict prerender).
      - run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Only Chromium is configured (see playwright.config.ts).
      - run: npx playwright install --with-deps chromium

      # Playwright auto-starts the Vite dev server on :5173 and keys CI behaviour
      # off $CI (set by Actions). Feature flags default OFF for E2E.
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
